<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Tide - Login</title>

    <link rel="stylesheet" href="C:/Users/pc/Documents/GitHub/pmv-si-2026-1-pe1-t5-proj-skilltide-1/docs/etapa-3/rf-01.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container-login">

        <div class="login-box">

            <h1>Skill Tide</h1>
            <p>Conectando talentos com oportunidades</p>

            <form>

                <label>E-mail</label>
                <input type="email" 
                       placeholder="seu@email.com"
                       required
                >

                <label>Senha</label>
                <input type="password" 
                       placeholder="********"
                       required
                >

                <button type="submit">Entrar</button>

            </form>

            <span>
                Não possui conta?
                <a href="#">Criar conta</a>
            </span>

        </div>

    </div>

</body>
</html>
