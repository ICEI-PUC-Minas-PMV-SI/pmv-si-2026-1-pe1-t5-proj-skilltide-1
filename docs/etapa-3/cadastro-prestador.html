<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Prestadores</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
  background:#ffffff;
  min-height:100vh;
  margin:0;
  padding:0;
}

    .container{
  width:100%;
  min-height:100vh;
  background:#f5f5f5;
  display:flex;
}

    /* MENU LATERAL */
    .sidebar{
      width:230px;
      background:#efefef;
      border-right:1px solid #d1d5db;
      display:flex;
      flex-direction:column;
    }

    .logo{
      padding:25px;
      font-size:22px;
      font-weight:bold;
      color:#2563eb;
      border-bottom:1px solid #d1d5db;
    }

    .menu{
      padding:20px 15px;
    }

    .menu a{
      display:block;
      text-decoration:none;
      color:#374151;
      padding:14px 15px;
      border-radius:6px;
      margin-bottom:10px;
      transition:0.3s;
      font-size:15px;
    }

    .menu a:hover,
    .menu .active{
      background:#dbeafe;
      color:#2563eb;
      font-weight:bold;
    }

    /* CONTEÚDO */
    .content{
      flex:1;
      display:flex;
      flex-direction:column;
    }

    .topbar{
      height:70px;
      background:#ffffff;
      border-bottom:1px solid #d1d5db;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      padding:0 30px;
      gap:25px;
    }

    .topbar a{
      text-decoration:none;
      color:#4b5563;
      font-size:14px;
    }

    .main{
  padding:40px;
  flex:1;

  display:flex;
  flex-direction:column;
  align-items:center;
}

    .main h1{
  font-size:38px;
  color:#111827;
  margin-bottom:10px;
}

    .main p{
  color:#6b7280;
  margin-bottom:35px;
  width:100%;
  max-width:900px;
}

    /* FORMULÁRIO */
    .form-box{
  background:#ffffff;
  border:1px solid #d1d5db;
  border-radius:10px;
  padding:35px;
  width:100%;
  max-width:900px;
}

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .form-group{
      display:flex;
      flex-direction:column;
    }

    .full-width{
      grid-column:1 / 3;
    }

    label{
      margin-bottom:8px;
      font-size:14px;
      color:#111827;
      font-weight:600;
    }

    input,
    textarea,
    select{
      padding:14px;
      border:1px solid #cbd5e1;
      border-radius:6px;
      outline:none;
      font-size:14px;
      transition:0.3s;
      background:#fff;
    }

    input:focus,
    textarea:focus,
    select:focus{
      border-color:#2563eb;
      box-shadow:0 0 0 3px rgba(37,99,235,0.15);
    }

    textarea{
      resize:none;
      height:120px;
    }

    .btn{
      margin-top:30px;
      background:#2563eb;
      color:#fff;
      border:none;
      padding:15px 30px;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      background:#1d4ed8;
    }

    footer{
      text-align:center;
      padding:20px;
      font-size:13px;
      color:#6b7280;
      border-top:1px solid #d1d5db;
      background:#fafafa;
    }

    /* RESPONSIVO */
    @media(max-width:900px){

      .container{
        flex-direction:column;
      }

      .sidebar{
        width:100%;
      }

      .form-grid{
        grid-template-columns:1fr;
      }

      .full-width{
        grid-column:auto;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- MENU LATERAL -->
    <aside class="sidebar">

      <div class="logo">
        Skill Tide
      </div>

      <nav class="menu">
        <a href="#" class="active">Meu Perfil</a>
        <a href="#">Meus Serviços</a>
        <a href="#">Buscar Serviços</a>
        <a href="#">Mensagens</a>
      </nav>

    </aside>

    <!-- CONTEÚDO -->
    <div class="content">

      <header class="topbar">
        <a href="#">Início</a>
        <a href="#">Buscar</a>
        <a href="#">Mensagens</a>
      </header>

      <main class="main">

        <h1>Cadastro de Prestador de Serviços</h1>

        <p>
          Complete seu perfil para começar a oferecer serviços na plataforma.
        </p>

        <div class="form-box">

          <form>

            <div class="form-grid">

              <div class="form-group">
                <label>Nome Completo *</label>
                <input type="text" placeholder="Digite seu nome">
              </div>

              <div class="form-group">
                <label>E-mail *</label>
                <input type="email" placeholder="Digite seu e-mail">
              </div>

              <div class="form-group">
                <label>Telefone *</label>
                <input type="text" placeholder="(00) 00000-0000">
              </div>

              <div class="form-group">
                <label>CPF *</label>
                <input type="text" placeholder="000.000.000-00">
              </div>

              <div class="form-group">
                <label>Data de Nascimento</label>
                <input type="date">
              </div>

              <div class="form-group">
                <label>CEP</label>
                <input type="text" placeholder="00000-000">
              </div>

              <div class="form-group full-width">
                <label>Endereço</label>
                <input type="text" placeholder="Rua, número e bairro">
              </div>

              <div class="form-group">
                <label>Cidade</label>
                <input type="text" placeholder="Digite sua cidade">
              </div>

              <div class="form-group">
              <label>Estado</label>
             <select>
             <option>Selecione</option>
    <option>AC</option>
    <option>AL</option>
    <option>AP</option>
    <option>AM</option>
    <option>BA</option>
    <option>CE</option>
    <option>DF</option>
    <option>ES</option>
    <option>GO</option>
    <option>MA</option>
    <option>MT</option>
    <option>MS</option>
    <option>MG</option>
    <option>PA</option>
    <option>PB</option>
    <option>PR</option>
    <option>PE</option>
    <option>PI</option>
    <option>RJ</option>
    <option>RN</option>
    <option>RS</option>
    <option>RO</option>
    <option>RR</option>
    <option>SC</option>
    <option>SP</option>
    <option>SE</option>
    <option>TO</option>
  </select>
</div>

              <div class="form-group full-width">
                <label>Área de Atuação</label>
                <input type="text" placeholder="Ex: Eletricista, Designer, Programador...">
              </div>

              <div class="form-group full-width">
                <label>Biografia</label>
                <textarea placeholder="Conte um pouco sobre você e seus serviços..."></textarea>
              </div>

            </div>

            <button class="btn">
              Cadastrar Perfil
            </button>

          </form>

        </div>

      </main>

      <footer>
        © 2026 Skill Tide. Todos os direitos reservados.
      </footer>

    </div>

  </div>

</body>
</html>
