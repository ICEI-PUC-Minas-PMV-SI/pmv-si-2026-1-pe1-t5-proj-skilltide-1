<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Prestadores</title>

  <!-- CSS EXTERNO -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- MENU LATERAL -->
    <aside class="sidebar">

      <div class="logo">
        Skill Tide
      </div>

      <nav class="menu">
        <a href="#" class="active">Meu Perfil</a>
        <a href="#">Meus Serviços</a>
        <a href="#">Buscar Serviços</a>
        <a href="#">Mensagens</a>
      </nav>

    </aside>

    <!-- CONTEÚDO -->
    <div class="content">

      <header class="topbar">
        <a href="#">Início</a>
        <a href="#">Buscar</a>
        <a href="#">Mensagens</a>
      </header>

      <main class="main">

        <h1>Cadastro de Prestador de Serviços</h1>

        <p>
          Complete seu perfil para começar a oferecer serviços na plataforma.
        </p>

        <div class="form-box">

          <form>

            <div class="form-grid">

              <div class="form-group">
                <label>Nome Completo *</label>
                <input type="text" placeholder="Digite seu nome">
              </div>

              <div class="form-group">
                <label>E-mail *</label>
                <input type="email" placeholder="Digite seu e-mail">
              </div>

              <div class="form-group">
                <label>Telefone *</label>
                <input type="text" placeholder="(00) 00000-0000">
              </div>

              <div class="form-group">
                <label>CPF *</label>
                <input type="text" placeholder="000.000.000-00">
              </div>

              <div class="form-group">
                <label>Data de Nascimento</label>
                <input type="date">
              </div>

              <div class="form-group">
                <label>CEP</label>
                <input type="text" placeholder="00000-000">
              </div>

              <div class="form-group full-width">
                <label>Endereço</label>
                <input type="text" placeholder="Rua, número e bairro">
              </div>

              <div class="form-group">
                <label>Cidade</label>
                <input type="text" placeholder="Digite sua cidade">
              </div>

              <div class="form-group">
                <label>Estado</label>
                <select>
                  <option>Selecione</option>
                  <option>AC</option>
                  <option>AL</option>
                  <option>AP</option>
                  <option>AM</option>
                  <option>BA</option>
                  <option>CE</option>
                  <option>DF</option>
                  <option>ES</option>
                  <option>GO</option>
                  <option>MA</option>
                  <option>MT</option>
                  <option>MS</option>
                  <option>MG</option>
                  <option>PA</option>
                  <option>PB</option>
                  <option>PR</option>
                  <option>PE</option>
                  <option>PI</option>
                  <option>RJ</option>
                  <option>RN</option>
                  <option>RS</option>
                  <option>RO</option>
                  <option>RR</option>
                  <option>SC</option>
                  <option>SP</option>
                  <option>SE</option>
                  <option>TO</option>
                </select>
              </div>

              <div class="form-group full-width">
                <label>Área de Atuação</label>
                <input type="text" placeholder="Ex: Eletricista, Designer, Programador...">
              </div>

              <div class="form-group full-width">
                <label>Biografia</label>
                <textarea placeholder="Conte um pouco sobre você e seus serviços..."></textarea>
              </div>

            </div>

            <button class="btn">
              Cadastrar Perfil
            </button>

          </form>

        </div>

      </main>

      <footer>
        © 2026 Skill Tide. Todos os direitos reservados.
      </footer>

    </div>

  </div>

</body>
</html>
