<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skill Tide - Mensagens</title>

<link rel="stylesheet" href="./chat-usuario.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="sidebar">

    <div class="logo">
        Skill Tide
    </div>

    <nav class="menu">
        <a href="#">Dashboard</a>
        <a href="#">Serviços</a>
        <a href="#">Solicitações</a>
        <a href="#" class="active">Mensagens</a>
        <a href="#">Perfil</a>
    </nav>

</div>

<div class="chat-container">

    <aside class="conversations">

        <div class="top-search">
            <input
            type="text"
            class="search-input"
            placeholder="Pesquisar conversa">
        </div>

        <div class="conversation active">

            <img src="assets/avatar1.jpg" class="avatar">

            <div class="conversation-info">
                <h3>João Henrique</h3>
                <p>Última mensagem...</p>
            </div>

            <span class="status online"></span>

        </div>

        <div class="conversation">

            <img src="assets/avatar2.jpg" class="avatar">

            <div class="conversation-info">
                <h3>Marcos Silva</h3>
                <p>Orçamento enviado</p>
            </div>

            <span class="status online"></span>

        </div>

        <div class="conversation">

            <img src="assets/avatar3.jpg" class="avatar">

            <div class="conversation-info">
                <h3>Ana Clara</h3>
                <p>Obrigada!</p>
            </div>

            <span class="status offline"></span>

        </div>

    </aside>

    <section class="chat-box">

       <div class="chat-header">

    <img src="assets/avatar1.jpg"
         class="avatar"
         id="headerAvatar">

    <div>

        <h2 id="headerName">
            João Henrique
        </h2>

        <small id="headerStatus">
            Online
        </small>

    </div>

</div>

        <div class="messages" id="messages">

            <div class="message received">
                <p>Olá! Você está disponível hoje?</p>
                <span>09:15</span>
            </div>

            <div class="message sent">
                <p>Sim, estou disponível.</p>
                <span>09:17</span>
            </div>

        </div>

        <div class="chat-input">

            <input
            type="text"
            id="messageInput"
            placeholder="Digite sua mensagem">

            <button id="sendBtn">
                Enviar
            </button>

        </div>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
